# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project
  uuid: e3c8ed54-e083-4df0-9e8b-acb557a3c690

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables: 
  catalog:
    default: "citibike_dev"
    description: The catalog to use
  dev_flag:
    default: "true"
    description: Whether to deploy the pipeline in development mode (true) or production mode (false)  

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405607700420185.5.azuredatabricks.net
  test:
    mode: production
    workspace:
      host: https://adb-7405618204303753.13.azuredatabricks.net/
      # We explicitly deploy to /Workspace/Users/dobiasz.laszlo@outlook.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: "citibike_test"
      dev_flag: "false"
    permissions:
      - service_principal_name: 91929b53-9234-448e-b3b9-ee5160dd5dd3
        level: CAN_MANAGE    
    run_as:
      service_principal_name: 91929b53-9234-448e-b3b9-ee5160dd5dd3   
  prod:
    mode: production
    workspace:
      host: https://adb-7405613840216350.10.azuredatabricks.net/
      # We explicitly deploy to /Workspace/Users/dobiasz.laszlo@outlook.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: "citibike_prod"
      dev_flag: "false"
    permissions:
      - service_principal_name: a4da4a6d-dc9f-419c-9ed2-21b9f9da98db
        level: CAN_MANAGE
    run_as:
      service_principal_name: a4da4a6d-dc9f-419c-9ed2-21b9f9da98db