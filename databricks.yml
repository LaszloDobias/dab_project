# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project
  uuid: e3c8ed54-e083-4df0-9e8b-acb557a3c690

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405617250614037.17.azuredatabricks.net
      root_path: /Workspace/Users/zebulonia@mail.com/bundle_deployments/${bundle.name}/${bundle.target}
    variables:
      catalog: dbw_dev
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://adb-7405617250614037.17.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/zebulonia@mail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/zebulonia@mail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dbw_dev
      schema: prod
    permissions:
      - user_name: zebulonia@mail.com
        level: CAN_MANAGE
